<section><h4>연산자 예제 실습</h4>


<script>

var sum=0; 
var num=window.prompt("몇명?:");
num=parseFloat(num);
for(var i=0; i<num i++)
{var score=window.prompt(i+1, "번째 학생 점수:");
score=parseFloat(score);
sum=sum+score;}
var average=sum/num;
document.write("평균=", average, "<br/>");



</script></section>
